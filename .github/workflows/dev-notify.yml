name: Branch Push Notification

on:
  push:
    branches:
      - '*'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_thread_id: "1265"
          format: html
          message: |
            <b>🚀 Новий пуш на гілці <code>${{ github.ref_name }}</code>!</b>
            <b>Автор:</b> ${{ github.actor }}
            <b>Повідомлення:</b> ${{ github.event.head_commit.message }}
            <a href="${{ github.event.head_commit.url }}">Переглянути зміни на GitHub</a>