    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign up - Duplo</title>
        <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    </head>
    <body>
        <div class="login-container">

            <h1 class="title" style="margin-bottom: 30px;">Sign up with Email</h1>
            <form class="auth-form" action="/signup" method="POST">
                <input type="text" name="username" autocomplete="name" class="form-input" placeholder="Full Name" required>
                <input type="email" name="email" autocomplete="email" class="form-input" placeholder="Email" required>
                
                <div class="input-wrapper">
                    <input type="password" name="password" autocomplete="new-password" class="form-input" placeholder="Password" required>
                    <svg class="eye-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />

                    </svg>
                </div>
                
                <div class="input-wrapper">

                    <input type="password" name="confirm_password" autocomplete="new-password" class="form-input" placeholder="Confirm password" required>
                    <svg class="eye-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />

                    </svg>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 10px;">Sign up</button>
            </form>
            
            <p class="footer-text">
                Existing account? <a href="/signin" class="sign-in-link">Sign in.</a>
            </p>
        </div>

        <script src="{{ url_for('static', path='/js/eye-password.js') }}"></script> 
    </body>
    </html>
