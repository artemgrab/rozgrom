<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Duplo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">
        <h1 class="title">
            Welcome to<br>
            <img src="duplo.png" alt="Duplo" class="logo-img">
        </h1>

        <p class="subtitle">
            Connect with friends and<br>family instantly.
        </p>

        <div class="social-login">
            <button class="social-btn" aria-label="Sign in with Google">
                <img src="google-icon.png" alt="Google">
            </button>

            <button class="social-btn" aria-label="Sign in with Facebook">
                <img src="facebook-icon.png" alt="Facebook">
            </button>
        </div>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn-primary" onclick="window.location.href='sign-up.html'">Sign up with Email</button>

        <p class="footer-text">
            Existing account? <a href="sign-in.html" class="sign-in-link">Sign in.</a>
        </p>
    </div>

</body>

</html>
